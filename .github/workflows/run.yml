name: 刷步数

on:
  schedule:
    - cron: '0 1,4,7,10,14,23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 检查有效日期
        id: date_gate
        shell: bash
        run: |
          today=$(TZ=Asia/Shanghai date +%F)
          today_num=${today//-/}
          active=false

          if (( (today_num >= 20260724 && today_num <= 20260812) ||
                (today_num >= 20261001 && today_num <= 20261209) ||
                (today_num >= 20270501 && today_num <= 20270709) ||
                (today_num >= 20271001 && today_num <= 20271209) ||
                (today_num >= 20280501 && today_num <= 20280709) )); then
            active=true
          fi

          echo "active=$active" >> "$GITHUB_OUTPUT"
          echo "北京时间日期：$today；有效：$active"

      - name: Checkout codes
        if: steps.date_gate.outputs.active == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }} #此处PAT需要申请，教程详见：README

      - name: Update system and install zsh
        if: steps.date_gate.outputs.active == 'true'
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y

      - name: 初始化Python
        if: steps.date_gate.outputs.active == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 开始
        if: steps.date_gate.outputs.active == 'true'
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py

      - name: persist tokens
        if: always() && steps.date_gate.outputs.active == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add encrypted_tokens.data
          if git diff --cached --quiet; then
            echo "Token 无变化，无需提交"
          else
            git commit -m "persist tokens trigger by ${{ github.event_name }}"
            git push origin master
          fi
